<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PortalUjet - Persone</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/sicurezza.js"></script>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <style>
    .text-bg-orange { background-color: #fd7e14 !important; color: #fff !important; }
  </style>
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
      <a class="navbar-brand fw-semibold d-flex align-items-center" href="prg.html">
        <span class="me-2">☰</span>
        <img src="/assets/logo-ujet.jpeg" alt="Logo" style="height: 30px; margin-right: 10px; object-fit: contain;">
        <span>Ujet Progetti</span>
      </a>
      <div class="d-flex align-items-center gap-2 ms-auto">
        <a class="btn btn-sm btn-outline-light" href="prg.html">Progetti</a>
        <a class="btn btn-sm btn-light" href="persone.html">Persone</a>
        <a class="btn btn-sm btn-outline-light" href="reparti.html">Reparti</a>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-4">
    <div id="appAlert" class="alert alert-danger d-none" role="alert"></div>
    <div class="card shadow-sm">
      <div class="card-header bg-white d-flex justify-content-between align-items-center">
        <div class="d-flex justify-content-between align-items-center w-100">
          <h5 class="mb-0">Anagrafica Personale</h5>
          <button
            type="button"
            class="btn btn-primary btn-sm"
            data-bs-toggle="modal"
            data-bs-target="#modalCreaPersonale"
          >
            Aggiungi Personale
          </button>
        </div>
      </div>
      <div class="card-body p-0">
        <div class="table-responsive">
          <table class="table table-hover mb-0">
            <thead class="table-light">
              <tr>
                <th scope="col">Nome</th>
                <th scope="col">Cognome</th>
                <th scope="col">Ruolo Aziendale</th>
                <th scope="col">Email</th>
                <th scope="col" class="text-end">Azioni</th>
              </tr>
            </thead>
            <tbody id="listaPersone">
              <tr>
                <td colspan="5" class="text-muted">Nessuna persona disponibile.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <div class="modal fade" id="modalCreaPersonale" tabindex="-1" aria-labelledby="modalCreaPersonaleLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="modalCreaPersonaleLabel">Aggiungi Personale</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Chiudi"></button>
        </div>
        <div class="modal-body">
          <form id="formCreaPersonale">
            <div class="mb-3">
              <label for="nomePersona" class="form-label">Nome</label>
              <input type="text" class="form-control" id="nomePersona" required>
            </div>
            <div class="mb-3">
              <label for="cognomePersona" class="form-label">Cognome</label>
              <input type="text" class="form-control" id="cognomePersona" required>
            </div>
            <div class="mb-3">
              <label for="emailPersona" class="form-label">Email</label>
              <input type="email" class="form-control" id="emailPersona">
            </div>
            <div class="mb-0">
              <label for="ruoloPersona" class="form-label">Ruolo Aziendale</label>
              <input type="text" class="form-control" id="ruoloPersona" required>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Chiudi</button>
          <button type="submit" class="btn btn-primary" form="formCreaPersonale">Salva</button>
        </div>
      </div>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="persone.js"></script>
</body>
</html>
