<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PortalUjet - Scheda Persona</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/sicurezza.js"></script>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="/gb2/css/gb2-shell.css">
  <style>
    .text-bg-orange { background-color: #fd7e14 !important; color: #fff !important; }
  </style>
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
      <button type="button" class="gb2-menu-btn me-2" id="menuBtn" aria-label="Apri menu">&#9776;</button>
      <a class="navbar-brand fw-semibold d-flex align-items-center" href="prg.html">
        <img src="/assets/logo-ujet.jpeg" alt="Logo" style="height: 30px; margin-right: 10px; object-fit: contain;">
        <span>Ujet Progetti</span>
      </a>
      <div class="d-flex align-items-center gap-2 ms-auto">
        <a class="btn btn-sm btn-outline-light" href="prg.html">Progetti</a>
        <a class="btn btn-sm btn-light" href="persone.html">Persone</a>
        <a class="btn btn-sm btn-outline-light" href="aree.html">Aree</a>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-4">
    <div id="appAlert" class="alert alert-danger d-none" role="alert"></div>
    <div class="row g-4">
      <section class="col-12">
        <div class="card shadow-sm">
          <div class="card-header bg-white">
            <div class="mb-3">
              <a href="persone.html" class="text-decoration-none text-secondary">
                &larr; Torna alle Persone
              </a>
            </div>
            <div class="d-flex justify-content-between align-items-center">
              <h5 class="mb-0">Anagrafica Persona</h5>
              <div class="d-flex">
                <button type="button" id="btnModificaPersona" class="btn btn-outline-primary me-2 btn-sm" data-bs-toggle="modal" data-bs-target="#modalModificaPersona">Modifica</button>
                <button type="button" id="btnEliminaPersona" class="btn btn-danger btn-sm">Elimina</button>
              </div>
            </div>
          </div>
          <div class="card-body">
            <div class="row g-3">
              <div class="col-12 col-md-3">
                <label class="form-label text-muted mb-1">Nome</label>
                <div id="dettaglioNome" class="fw-semibold">-</div>
              </div>
              <div class="col-12 col-md-3">
                <label class="form-label text-muted mb-1">Cognome</label>
                <div id="dettaglioCognome" class="fw-semibold">-</div>
              </div>
              <div class="col-12 col-md-3">
                <label class="form-label text-muted mb-1">Ruolo Aziendale</label>
                <div id="dettaglioRuolo" class="fw-semibold">-</div>
              </div>
              <div class="col-12 col-md-3">
                <label class="form-label text-muted mb-1">Email</label>
                <div id="dettaglioEmail" class="fw-semibold">-</div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section class="col-12">
        <div class="card shadow-sm">
          <div class="card-header bg-white">
            <h5 class="mb-0">Progetti della Persona</h5>
          </div>
          <div class="card-body p-0">
            <div class="table-responsive">
              <table class="table table-hover mb-0">
                <thead class="table-light">
                  <tr>
                    <th scope="col">Nome Progetto</th>
                    <th scope="col">Ruolo</th>
                    <th scope="col">Priorità</th>
                    <th scope="col">Stato</th>
                  </tr>
                </thead>
                <tbody id="listaProgettiPersona">
                  <tr>
                    <td colspan="4" class="text-muted">Nessun progetto assegnato.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div class="modal fade" id="modalModificaPersona" tabindex="-1" aria-labelledby="modalModificaPersonaLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="modalModificaPersonaLabel">Modifica Persona</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Chiudi"></button>
        </div>
        <div class="modal-body">
          <form id="formModificaPersona">
            <div class="mb-3">
              <label for="editNomePersona" class="form-label">Nome</label>
              <input type="text" class="form-control" id="editNomePersona" required>
            </div>
            <div class="mb-3">
              <label for="editCognomePersona" class="form-label">Cognome</label>
              <input type="text" class="form-control" id="editCognomePersona" required>
            </div>
            <div class="mb-3">
              <label for="editEmailPersona" class="form-label">Email</label>
              <input type="email" class="form-control" id="editEmailPersona">
            </div>
            <div class="mb-0">
              <label for="editRuoloPersona" class="form-label">Ruolo Aziendale</label>
              <input type="text" class="form-control" id="editRuoloPersona" required>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Chiudi</button>
          <button type="submit" class="btn btn-primary" form="formModificaPersona">Salva</button>
        </div>
      </div>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="/assets/js/portal-sidebar.js"></script>
  <script src="persona.js"></script>
</body>
</html>
