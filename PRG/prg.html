<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>PortalUjet - Progetti</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/sicurezza.js"></script>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
    crossorigin="anonymous"
  >
  <link rel="stylesheet" href="/gb2/css/gb2-shell.css">
  <style>
    .text-bg-orange { background-color: #fd7e14 !important; color: #fff !important; }
    .progetto-row { cursor: pointer; transition: background-color 0.2s ease; }
    .progetto-row:hover { background-color: rgba(0, 123, 255, 0.05) !important; }
  </style>
</head>
<body class="bg-light">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow-sm">
    <div class="container-fluid">
      <button type="button" class="gb2-menu-btn me-2" id="menuBtn" aria-label="Apri menu">&#9776;</button>
      <a class="navbar-brand fw-semibold d-flex align-items-center" href="prg.html">
        <img src="/assets/logo-ujet.jpeg" alt="Logo" style="height: 30px; margin-right: 10px; object-fit: contain;">
        <span>Ujet Progetti</span>
      </a>
      <div class="d-flex align-items-center gap-2 ms-auto">
        <a class="btn btn-sm btn-light" href="prg.html">Progetti</a>
        <a class="btn btn-sm btn-outline-light" href="persone.html">Persone</a>
        <a class="btn btn-sm btn-outline-light" href="aree.html">Aree</a>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-4">
    <div id="appAlert" class="alert alert-danger d-none" role="alert"></div>
    <div class="row g-4">
      <section class="col-12">
        <div class="card h-100 shadow-sm">
          <div class="card-header bg-white d-flex justify-content-between align-items-center">
            <div class="d-flex justify-content-between align-items-center w-100">
              <h5 class="mb-0">Elenco Progetti</h5>
              <button
                type="button"
                class="btn btn-primary btn-sm"
                data-bs-toggle="modal"
                data-bs-target="#modalCreaProgetto"
              >
                Nuovo Progetto
              </button>
            </div>
          </div>
          <div class="card-body">
            <section class="mb-4">
              <h6 class="mb-3">Filtri Globali</h6>
              <div class="d-flex flex-wrap gap-3">
                <div class="flex-grow-1" style="min-width: 220px;">
                  <label for="filtroArea" class="form-label">Area</label>
                  <select id="filtroArea" class="form-select">
                    <option value="">Tutte le Aree</option>
                  </select>
                </div>
                <div class="flex-grow-1" style="min-width: 220px;">
                  <label for="filtroPriorita" class="form-label">Priorita</label>
                  <select id="filtroPriorita" class="form-select">
                    <option value="">Tutte le Priorita</option>
                    <option value="Bassa">Bassa</option>
                    <option value="Media">Media</option>
                    <option value="Alta">Alta</option>
                    <option value="Critica">Critica</option>
                  </select>
                </div>
                <div class="flex-grow-1" style="min-width: 220px;">
                  <label for="filtroStato" class="form-label">Stato</label>
                  <select id="filtroStato" class="form-select">
                    <option value="">Tutti gli Stati</option>
                  </select>
                </div>
              </div>
            </section>
            <div class="table-responsive">
              <table class="table table-hover mb-0">
                <thead class="table-light">
                  <tr>
                    <th scope="col">Nome</th>
                    <th scope="col">Area</th>
                    <th scope="col">Data Inizio</th>
                    <th scope="col">Priorita</th>
                    <th scope="col">Stato</th>
                    <th scope="col" class="text-end" style="width: 1%; white-space: nowrap;">Apri</th>
                  </tr>
                </thead>
                <tbody id="tabellaProgettiBody">
                  <tr>
                    <td colspan="6" class="text-muted">Nessun progetto disponibile.</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>

  <div class="modal fade" id="modalCreaProgetto" tabindex="-1" aria-labelledby="modalCreaProgettoLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h1 class="modal-title fs-5" id="modalCreaProgettoLabel">Nuovo Progetto</h1>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Chiudi"></button>
        </div>
        <div class="modal-body">
          <form id="formCreaProgetto">
            <div class="mb-3">
              <label for="nomeProgetto" class="form-label">Nome</label>
              <input type="text" class="form-control" id="nomeProgetto" placeholder="Inserisci nome progetto" required>
            </div>
            <div class="mb-3">
              <label for="descrizioneProgetto" class="form-label">Descrizione</label>
              <textarea class="form-control" id="descrizioneProgetto" rows="3" placeholder="Inserisci descrizione"></textarea>
            </div>
            <div class="mb-0">
              <label for="dataProgetto" class="form-label">Data</label>
              <input type="date" class="form-control" id="dataProgetto" required>
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Chiudi</button>
          <button type="submit" class="btn btn-primary" form="formCreaProgetto">Salva</button>
        </div>
      </div>
    </div>
  </div>

  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
    crossorigin="anonymous"
  ></script>
  <script src="/assets/js/portal-sidebar.js"></script>
  <script src="prg.js"></script>
</body>
</html>
