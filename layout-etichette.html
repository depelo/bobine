<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Gestione Layout Etichette</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="sicurezza.js"></script>
</head>
<body>
<main class="container py-4">
    <header class="d-flex justify-content-between align-items-center mb-3">
        <h1 class="h4 mb-0">Gestione Layout Etichette</h1>
        <a href="ET.html" class="btn btn-outline-secondary btn-sm">Indietro</a>
    </header>

    <div id="alertBox" class="mb-3"></div>

    <section class="card">
        <div class="card-body">
            <div class="d-flex justify-content-end mb-3">
                <button id="createBtn" class="btn btn-primary btn-sm" type="button">Crea Nuovo</button>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle" id="formsTable">
                    <thead class="table-light">
                    <tr>
                        <th style="width: 80px;">ID</th>
                        <th style="width: 260px;">Nome Form</th>
                        <th>Note</th>
                        <th style="width: 140px;">Stato</th>
                        <th style="width: 180px;">Azioni</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<div class="modal fade" id="formModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <form class="modal-content" id="formModalForm">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Crea Nuovo Form</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Chiudi"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="idFormInput">
                <div class="mb-3">
                    <label class="form-label" for="formInput">Form</label>
                    <input id="formInput" type="text" class="form-control" maxlength="40">
                </div>
                <div class="mb-3 form-check">
                    <input id="validoInput" type="checkbox" class="form-check-input" checked>
                    <label class="form-check-label" for="validoInput">Valido</label>
                </div>
                <div class="mb-0">
                    <label class="form-label" for="noteInput">Note</label>
                    <textarea id="noteInput" class="form-control" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Annulla</button>
                <button type="submit" class="btn btn-primary">Salva</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const modal = new bootstrap.Modal(document.getElementById('formModal'));
    let editingId = null;

    function openCreateModal() {
        editingId = null;
        document.getElementById('modalTitle').textContent = 'Crea Nuovo Form';
        document.getElementById('formInput').value = '';
        document.getElementById('validoInput').checked = true;
        document.getElementById('noteInput').value = '';
        modal.show();
    }

    function editForm(item) {
        editingId = item.IDForm;
        document.getElementById('modalTitle').textContent = 'Modifica Form';
        document.getElementById('formInput').value = item.Form || '';
        document.getElementById('validoInput').checked = !!item.Valido;
        document.getElementById('noteInput').value = item.Note || '';
        modal.show();
    }

    async function deleteForm(id) {
        if (!confirm('Confermi eliminazione (soft-delete)?')) return;
        try {
            const response = await fetch(`/api/forms/${id}`, {
                method: 'DELETE',
                credentials: 'include'
            });
            if (!response.ok) throw new Error(`Errore di rete: ${response.status}`);
            await loadForms();
        } catch (error) {
            console.error('Errore eliminazione:', error);
            alert('Errore durante l\'eliminazione.');
        }
    }

    async function saveForm(event) {
        event.preventDefault();
        const payload = {
            Form: document.getElementById('formInput').value,
            Valido: document.getElementById('validoInput').checked,
            Note: document.getElementById('noteInput').value
        };

        const method = editingId ? 'PUT' : 'POST';
        const url = editingId ? `/api/forms/${editingId}` : '/api/forms';

        try {
            const response = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error(`Errore di rete: ${response.status}`);
            modal.hide();
            await loadForms();
        } catch (error) {
            console.error('Errore salvataggio:', error);
            alert('Errore durante il salvataggio.');
        }
    }

    async function loadForms() {
        try {
            const response = await fetch('/api/forms', { credentials: 'include' });
            if (!response.ok) throw new Error(`Errore di rete: ${response.status}`);
            
            const data = await response.json();
            const tbody = document.querySelector('#formsTable tbody');
            tbody.innerHTML = '';
            
            data.forEach(item => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${item.IDForm}</td>
                    <td>${item.Form || ''}</td>
                    <td>${item.Note || ''}</td>
                    <td><span class="badge ${item.Valido ? 'bg-success' : 'bg-secondary'}">${item.Valido ? 'Attivo' : 'Inattivo'}</span></td>
                    <td>
                        <button class="btn btn-sm btn-outline-primary me-2" onclick='editForm(${JSON.stringify(item)})'>Modifica</button>
                        <button class="btn btn-sm btn-outline-danger" onclick='deleteForm(${item.IDForm})'>Elimina</button>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        } catch (error) {
            console.error("Errore caricamento:", error);
            alert("Errore durante il caricamento dei dati. Controlla la console.");
        }
    }

    document.getElementById('createBtn').addEventListener('click', openCreateModal);
    document.getElementById('formModalForm').addEventListener('submit', saveForm);
    document.addEventListener('securityReady', loadForms);
    document.addEventListener('DOMContentLoaded', loadForms); // Fallback
</script>
</body>
</html>
