<!doctype html>
<html lang="it">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Form - Gestione Layout</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="bobine.css" />
    <script src="sicurezza.js"></script>
</head>
<body>
<main class="container py-4">
    <header class="d-flex align-items-center gap-3 mb-4 flex-wrap">
        <a href="ET.html" class="btn btn-sm btn-outline-secondary shadow-sm" title="Torna a Progettazione Etichette" aria-label="Indietro">
            <i class="bi bi-arrow-left fs-6"></i>
        </a>

        <img src="logo.png" alt="Logo U.Jet" style="height: 38px; object-fit: contain;">

        <h1 class="h4 mb-0 text-danger border-start border-2 ps-3 fw-normal">Form</h1>
    </header>

    <div id="alertBox" class="mb-3"></div>

    <section class="card">
        <div class="card-body">
            <div class="d-flex justify-content-end mb-3">
                <button id="createBtn" class="btn btn-primary btn-sm" type="button">Crea Nuovo</button>
            </div>

            <div class="table-responsive">
                <table class="table table-hover align-middle" id="formsTable">
                    <thead class="table-light">
                    <tr>
                        <th style="cursor: pointer; user-select: none;" onclick="sortById()">ID <i class="bi bi-arrow-down-up text-muted" style="font-size: 0.8rem;"></i></th>
                        <th style="cursor: pointer; user-select: none;" onclick="sortByName()">Nome Form <i class="bi bi-arrow-down-up text-muted" style="font-size: 0.8rem;"></i></th>
                        <th>Note</th>
                        <th>Stato</th>
                        <th>Azioni</th>
                    </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </section>
</main>

<div class="modal fade" id="formModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <form class="modal-content" id="formModalForm">
            <div class="modal-header">
                <h5 class="modal-title" id="modalTitle">Crea Nuovo Form</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Chiudi"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="idFormInput">
                <div class="mb-3">
                    <label class="form-label" for="formInput">Form</label>
                    <input id="formInput" type="text" class="form-control" maxlength="40">
                </div>
                <div class="mb-3 form-check">
                    <input id="validoInput" type="checkbox" class="form-check-input" checked>
                    <label class="form-check-label" for="validoInput">Valido</label>
                </div>
                <div class="mb-0">
                    <label class="form-label" for="noteInput">Note</label>
                    <textarea id="noteInput" class="form-control" rows="3"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Annulla</button>
                <button type="submit" class="btn btn-primary">Salva</button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const modal = new bootstrap.Modal(document.getElementById('formModal'));
    let editingId = null;
    let formsData = [];
    let sortDirection = { id: true, name: true };

    function openCreateModal() {
        editingId = null;
        document.getElementById('modalTitle').textContent = 'Crea Nuovo Form';
        document.getElementById('formInput').value = '';
        document.getElementById('validoInput').checked = true;
        document.getElementById('noteInput').value = '';
        modal.show();
    }

    function editForm(item) {
        editingId = item.IDForm || item.Codice;
        document.getElementById('modalTitle').textContent = 'Modifica Form';
        document.getElementById('formInput').value = item.Form || item.NomeForm || '';
        document.getElementById('validoInput').checked = item.Valido !== undefined ? !!item.Valido : true;
        document.getElementById('noteInput').value = item.Note || '';
        modal.show();
    }

    async function deleteForm(id) {
        if (!confirm('Confermi eliminazione (soft-delete)?')) return;
        try {
            const response = await fetch(`/api/forms/${id}`, {
                method: 'DELETE',
                credentials: 'include'
            });
            if (!response.ok) throw new Error(`Errore di rete: ${response.status}`);
            await loadForms();
        } catch (error) {
            console.error('Errore eliminazione:', error);
            alert('Errore durante l\'eliminazione. Ricorda che il backend sulla VM deve essere aggiornato.');
        }
    }

    async function saveForm(event) {
        event.preventDefault();
        const payload = {
            Form: document.getElementById('formInput').value,
            Valido: document.getElementById('validoInput').checked,
            Note: document.getElementById('noteInput').value
        };

        const method = editingId ? 'PUT' : 'POST';
        const url = editingId ? `/api/forms/${editingId}` : '/api/forms';

        try {
            const response = await fetch(url, {
                method,
                headers: { 'Content-Type': 'application/json' },
                credentials: 'include',
                body: JSON.stringify(payload)
            });
            if (!response.ok) throw new Error(`Errore di rete: ${response.status}`);
            modal.hide();
            await loadForms();
        } catch (error) {
            console.error('Errore salvataggio:', error);
            alert('Errore durante il salvataggio. Ricorda che il backend sulla VM deve essere aggiornato.');
        }
    }

    async function loadForms() {
        try {
            const response = await fetch('/api/form-list', { credentials: 'include' });
            if (!response.ok) throw new Error(`Errore di rete: ${response.status}`);

            formsData = await response.json();
            renderTable(formsData);
        } catch (error) {
            console.error("Errore caricamento:", error);
            alert("Errore durante il caricamento dei dati. Controlla la console.");
        }
    }

    function renderTable(data) {
        const tbody = document.querySelector('#formsTable tbody');
        if (!tbody) return;
        tbody.innerHTML = '';

        data.forEach(item => {
            const tr = document.createElement('tr');
            const id = item.IDForm || item.Codice || '-';
            const formName = item.Form || item.NomeForm || '';
            const valido = item.Valido !== undefined ? item.Valido : 1;

            // Nota: Ho lasciato disabilitati i pulsanti come da "Strada 2" finché non aggiorni la VM
            tr.innerHTML = `
                <td>${id}</td>
                <td>${formName}</td>
                <td>${item.Note || ''}</td>
                <td><span class="badge ${valido ? 'bg-success' : 'bg-secondary'}">${valido ? 'Attivo' : 'Inattivo'}</span></td>
                <td>
                    <button class="btn btn-sm btn-outline-primary me-2" onclick='editForm(${JSON.stringify(item)})' disabled title="Aggiornare backend su VM">Modifica</button>
                    <button class="btn btn-sm btn-outline-danger" onclick='deleteForm(${id})' disabled title="Aggiornare backend su VM">Elimina</button>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function sortById() {
        sortDirection.id = !sortDirection.id;
        formsData.sort((a, b) => {
            const valA = Number(a.IDForm || a.Codice || 0);
            const valB = Number(b.IDForm || b.Codice || 0);
            return sortDirection.id ? valA - valB : valB - valA;
        });
        renderTable(formsData);
    }

    function sortByName() {
        sortDirection.name = !sortDirection.name;
        formsData.sort((a, b) => {
            const valA = (a.Form || a.NomeForm || '').toString().toLowerCase();
            const valB = (b.Form || b.NomeForm || '').toString().toLowerCase();
            if (valA < valB) return sortDirection.name ? -1 : 1;
            if (valA > valB) return sortDirection.name ? 1 : -1;
            return 0;
        });
        renderTable(formsData);
    }

    document.getElementById('createBtn').addEventListener('click', openCreateModal);
    document.getElementById('formModalForm').addEventListener('submit', saveForm);

    // Evitiamo che venga chiamato due volte di fila
    let loaded = false;
    document.addEventListener('securityReady', () => { if (!loaded) { loaded = true; loadForms(); } });
    document.addEventListener('DOMContentLoaded', () => { if (!loaded) { loaded = true; loadForms(); } });
</script>
</body>
</html>
