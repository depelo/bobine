<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestione Profilo - UJet</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="index.css" />
    <style>
      .profile-container { max-width: 1000px; margin: 40px auto; background: var(--bg-content); padding: 32px; border-radius: var(--radius); box-shadow: 0 4px 20px rgba(0,0,0,0.1); position: relative; }
      .section-title { font-size: 1.2rem; font-weight: bold; border-bottom: 2px solid var(--border); padding-bottom: 8px; margin-bottom: 16px; margin-top: 32px; }
      .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; background: var(--bg-gradient); padding: 16px; border-radius: var(--radius-sm); }
      .back-btn-top { position: absolute; top: 24px; left: 24px; background: transparent; border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 6px 12px; cursor: pointer; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
      .back-btn-top:hover { background: var(--border); color: var(--text); }

      /* CSS Isolato per i Modali del Profilo (Nessun incrocio con bobine.css) */
      .prof-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 9999; }
      .prof-modal-overlay.is-active { display: flex; }
      .prof-modal-box { background: var(--bg-content); border-radius: var(--radius); padding: 32px; max-width: 90%; width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
      .prof-modal-title { font-size: 1.5rem; margin-bottom: 16px; font-weight: bold; }
      .prof-modal-text { font-size: 1rem; color: var(--text-muted); margin-bottom: 24px; }
      .prof-modal-btn { width: 100%; padding: 12px; border: none; border-radius: var(--radius-sm); font-weight: bold; font-size: 1.1rem; cursor: pointer; color: white; }
      .profile-block { background: var(--bg-gradient); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; height: 100%; }
    </style>
  </head>
  <body>
    <div class="profile-container" id="profMainContainer">
      <button class="back-btn-top" id="profBackBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        Indietro
      </button>
      <div style="text-align: center; margin-bottom: 24px;">
        <h1 style="margin: 0; color: var(--primary);">Il Mio Profilo</h1>
      </div>

      <div class="row g-3">
        <div class="col-lg-6">
          <div class="profile-block">
            <h2 class="section-title" style="margin-top: 0;">Il Mio Profilo</h2>
            <div class="info-grid" style="margin-bottom: 0;">
              <div>
                <span style="font-size: 0.85rem; color: var(--text-muted);">Nome</span>
                <div id="profName" style="font-weight: bold; font-size: 1.1rem;">-</div>
              </div>
              <div>
                <span style="font-size: 0.85rem; color: var(--text-muted);">Ruoli e Accessi</span>
                <div id="profRolesContainer" style="display: flex; flex-direction: column; gap: 8px; margin-top: 6px;">
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="col-lg-6">
          <div class="profile-block" id="passwordSectionWrapper">
            <h2 class="section-title" style="margin-top: 0;">Cambia Password</h2>
            <form id="changePwdForm">
              <div class="login-field">
                <label>Password Attuale</label>
                <input type="password" id="oldPwd" class="control" required />
              </div>
              <div class="login-field">
                <label>Nuova Password</label>
                <input type="password" id="newPwd" class="control" required />
              </div>
              <div class="login-field">
                <label>Conferma Nuova Password</label>
                <input type="password" id="confirmPwd" class="control" required />
              </div>
              
              <ul style="list-style: none; padding: 0; margin: 0 0 20px 0; font-size: 0.95rem; color: var(--text-muted);" id="profPwdChecklist">
                </ul>

              <div id="pwdMsg" class="login-message" style="min-height: 1.2em; text-align: left; margin-bottom: 12px;"></div>
              <button type="submit" class="action-btn" id="profSubmitPwdBtn" disabled style="background: var(--border); color: var(--text-muted); cursor: not-allowed; transition: all 0.3s;">Aggiorna Password</button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div class="prof-modal-overlay" id="profSuccessModal">
      <div class="prof-modal-box" style="text-align: center; padding: 40px 24px;">
        <div style="display: flex; justify-content: center; margin-bottom: 20px;">
            <div style="width: 64px; height: 64px; border-radius: 50%; background: #e6f4ea; display: flex; align-items: center; justify-content: center;">
                <svg xmlns="http://www.w3.org/2000/svg" width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
            </div>
        </div>
        <div class="prof-modal-title" style="color: var(--success); font-size: 1.5rem; margin-bottom: 12px;">Operazione Completata</div>
        <div class="prof-modal-text" id="profSuccessMsg" style="color: var(--text); font-size: 1.05rem; margin-bottom: 24px; line-height: 1.4;"></div>
        <button class="action-btn" style="background: var(--success); color: white; width: 100%; font-weight: bold; padding: 14px;" onclick="closeProfModals()">ACCETTA E CHIUDI</button>
      </div>
    </div>
    <div class="prof-modal-overlay" id="profErrorModal">
      <div class="prof-modal-box">
        <div class="prof-modal-title" style="color: var(--danger);">Errore</div>
        <div class="prof-modal-text" id="profErrorMsg"></div>
        <button class="prof-modal-btn" style="background: var(--danger);" onclick="closeProfModals()">Chiudi</button>
      </div>
    </div>

    <script src="profile.js"></script>
  </body>
</html>
