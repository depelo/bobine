<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UJet Gateway</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      body {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg, #0f172a);
      }
    </style>
  </head>
  <body>
    <div id="gatewayRoot">
      <div class="scanner-modal-inner">
        <!-- Il contenuto del login verrà gestito dal markup sottostante -->
      </div>
    </div>

    <div id="loginModal" aria-label="Login operatore" style="display:flex; align-items:center; justify-content:center;">
      <div class="scanner-modal-inner">
        <p class="scanner-title">Login operatore</p>
        <div class="login-field">
          <label for="loginBarcode">QR Code operatore</label>
          <div class="control with-icon-btn">
            <input id="loginBarcode" type="text" autocomplete="off" />
            <button type="button" class="icon-btn" data-action="login-scan-operator" title="Scansiona con fotocamera">
              <svg class="icon-camera" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </button>
          </div>
        </div>
        <div class="login-field is-hidden" id="loginPasswordField">
          <label for="loginPassword">Password</label>
          <div class="control">
            <input id="loginPassword" type="password" autocomplete="off" />
          </div>
        </div>
        <div id="loginMessage" class="login-message"></div>
        <div class="login-actions">
          <button type="button" class="scanner-cancel" id="loginSubmitBtn">Login</button>
        </div>
      </div>
    </div>

    <div class="scanner-modal" id="profileModal" aria-hidden="true">
      <div class="scanner-modal-inner" style="width: 400px; max-width: 95%;">
        <p class="scanner-title">Il Mio Profilo</p>
        
        <div style="background: var(--bg); padding: 12px; border-radius: var(--radius); margin-bottom: 20px;">
          <p style="margin: 0 0 4px 0; font-size: 0.9rem; color: var(--text-muted);">Nome Operatore</p>
          <p style="margin: 0 0 12px 0; font-weight: bold; font-size: 1.1rem;" id="profileNameDisplay">-</p>
          
          <div style="display: flex; gap: 16px;">
            <div>
              <p style="margin: 0 0 4px 0; font-size: 0.9rem; color: var(--text-muted);">Ruolo</p>
              <p style="margin: 0; font-weight: bold;" id="profileRoleDisplay">-</p>
            </div>
            <div>
              <p style="margin: 0 0 4px 0; font-size: 0.9rem; color: var(--text-muted);">Inizio Turno</p>
              <p style="margin: 0; font-weight: bold;" id="profileTimeDisplay">-</p>
            </div>
          </div>
        </div>

        <div id="profilePwdSection" style="display: none; border-top: 1px solid var(--border); padding-top: 16px;">
          <p style="font-weight: 600; margin-bottom: 12px;">Cambio Password</p>
          <div class="login-field">
            <label>Password Attuale</label>
            <input type="password" id="profileOldPwd" class="control" autocomplete="current-password">
          </div>
          <div class="login-field">
            <label>Nuova Password</label>
            <input type="password" id="profileNewPwd" class="control" autocomplete="new-password">
          </div>
          <p id="profilePwdMsg" style="color: var(--danger); font-size: 0.85rem; margin-bottom: 12px;"></p>
          <button type="button" class="action-btn" id="profileSavePwdBtn" style="width: 100%; background: var(--primary); color: white; border: none; font-size: 1rem; padding: 10px;">Aggiorna Password</button>
        </div>

        <div class="login-actions" style="margin-top: 24px;">
          <button type="button" class="scanner-cancel" id="profileCloseBtn" style="width: 100%;">Chiudi</button>
        </div>
      </div>
    </div>

    <audio id="barcodeBeepSound" preload="auto">
      <source src="beep.mp3" type="audio/mpeg" />
    </audio>

    <div class="scanner-modal" id="scannerModal" aria-hidden="true" aria-label="Scansione QR Code">
      <div class="scanner-modal-inner">
        <p class="scanner-title">Inquadra il QR Code</p>
        <div id="scannerContainer"></div>
        <button type="button" class="scanner-cancel" id="scannerCancel">Annulla</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="portal.js"></script>
  </body>
</html>
