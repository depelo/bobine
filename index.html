<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#2563a8" />
    <title>UJet Gateway - Login</title>
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    
    <div class="login-wrapper">
      <div id="loginModal" aria-label="Login operatore" class="login-box">
        
        <div class="gateway-brand">
          <img src="logo.png" alt="UJet Logo" class="brand-logo" />
          <p>Gateway di Accesso</p>
        </div>

        <div class="login-field">
          <label for="loginBarcode">QR Code Operatore</label>
          <div class="control with-icon-btn">
            <input id="loginBarcode" type="text" autocomplete="off" placeholder="Scansiona o digita..." />
            <button type="button" class="icon-btn" data-action="login-scan-operator" title="Scansiona con fotocamera">
              <svg class="icon-camera" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
            </button>
          </div>
        </div>

        <div class="login-field is-hidden" id="loginPasswordField" style="margin-top: 20px;">
          <label for="loginPassword">Password di Sicurezza</label>
          <div class="control">
            <input id="loginPassword" type="password" autocomplete="off" placeholder="Inserisci password..." />
          </div>
        </div>

        <div id="loginMessage" class="login-message"></div>

        <div class="login-actions" style="margin-top: 24px;">
          <button type="button" id="loginSubmitBtn" class="action-btn">Accedi al Sistema</button>
        </div>

      </div>
    </div>

    <audio id="barcodeBeepSound" preload="auto">
      <source src="beep.mp3" type="audio/mpeg" />
    </audio>

    <div class="scanner-modal" id="scannerModal" aria-hidden="true" aria-label="Scansione QR Code">
      <div class="scanner-modal-inner">
        <p class="scanner-title">Inquadra il QR Code</p>
        <div id="scannerContainer"></div>
        <button type="button" class="scanner-cancel" id="scannerCancel">Annulla</button>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
    <script src="portal.js"></script>
  </body>
</html>
