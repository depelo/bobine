<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Classificazione Deterministica - PortalUjet</title>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/sicurezza.js"></script>
  <link rel="stylesheet" href="/gb2/css/gb2-shell.css">
  <style>
    :root {
      --bg: #f4f6fa;
      --surface: #ffffff;
      --surface-muted: #f7f9fd;
      --text: #1f2937;
      --text-muted: #6b7280;
      --border: #d6deeb;
      --primary: #2f6feb;
      --primary-hover: #275ec6;
      --success: #0f9d58;
      --error: #d93025;
      --shadow: 0 10px 30px rgba(17, 24, 39, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      background: linear-gradient(180deg, #eef3fb 0%, var(--bg) 120px);
      color: var(--text);
    }

    .itt-navbar {
      display: flex;
      align-items: center;
      min-height: 56px;
      padding: 0 16px;
      background: #0d6efd;
      color: #fff;
      box-shadow: 0 2px 10px rgba(17, 24, 39, 0.15);
    }

    .itt-navbar-title {
      margin-left: 10px;
      font-weight: 700;
      letter-spacing: 0.2px;
    }

    .page {
      max-width: 1400px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      margin-bottom: 20px;
    }

    .header h1 {
      margin: 0 0 6px;
      font-size: 1.6rem;
      font-weight: 700;
    }

    .header p {
      margin: 0;
      color: var(--text-muted);
    }

    .layout {
      display: grid;
      grid-template-columns: 380px 1fr;
      gap: 18px;
      min-height: 72vh;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-title {
      margin: 0;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface-muted);
      font-size: 0.98rem;
      font-weight: 650;
    }

    .list-wrap {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .search-box {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
    }

    .search-box input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 0.95rem;
    }

    .records {
      overflow: auto;
      max-height: calc(72vh - 110px);
    }

    .record-item {
      width: 100%;
      text-align: left;
      background: transparent;
      border: 0;
      border-bottom: 1px solid #edf1f7;
      padding: 12px 14px;
      cursor: pointer;
    }

    .record-item:hover {
      background: #f7faff;
    }

    .record-item.active {
      background: #eaf2ff;
      border-left: 4px solid var(--primary);
      padding-left: 10px;
    }

    .record-code {
      display: inline-block;
      margin-right: 8px;
      font-weight: 700;
      color: #11458f;
    }

    .record-desc {
      color: var(--text);
    }

    .detail {
      padding: 18px;
    }

    .readonly-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .field-group {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-size: 0.88rem;
      font-weight: 650;
      color: #374151;
    }

    input,
    textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      color: var(--text);
      font-size: 0.95rem;
    }

    input[readonly] {
      background: #f0f4fb;
      color: #4b5563;
      font-weight: 600;
    }

    textarea {
      min-height: 170px;
      resize: vertical;
      line-height: 1.4;
    }

    .actions {
      margin-top: 14px;
      display: flex;
      justify-content: flex-end;
      gap: 10px;
    }

    .btn {
      border: 0;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.95rem;
      font-weight: 650;
      cursor: pointer;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
    }

    .btn-primary:hover {
      background: var(--primary-hover);
    }

    .btn-primary:disabled {
      cursor: not-allowed;
      opacity: 0.7;
    }

    .empty-state {
      color: var(--text-muted);
      padding: 18px;
      text-align: center;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      background: rgba(255, 255, 255, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
      backdrop-filter: blur(2px);
    }

    .loading-overlay.show {
      display: flex;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 5px solid #dbe7ff;
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .toast {
      position: fixed;
      right: 20px;
      bottom: 20px;
      min-width: 260px;
      max-width: 380px;
      background: #1f2937;
      color: #fff;
      padding: 12px 14px;
      border-radius: 10px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.2s ease;
      z-index: 1000;
      pointer-events: none;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .toast.success {
      background: var(--success);
    }

    .toast.error {
      background: var(--error);
    }

    @media (max-width: 1050px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .readonly-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div id="loadingOverlay" class="loading-overlay show" aria-live="polite" aria-label="Caricamento in corso">
    <div class="spinner" role="status"></div>
  </div>

  <nav class="itt-navbar" aria-label="Barra principale">
    <button type="button" class="gb2-menu-btn" id="menuBtn" aria-label="Apri menu">&#9776;</button>
    <span class="itt-navbar-title">PortalUjet - ITT</span>
  </nav>

  <div class="page">
    <header class="header">
      <h1>Classificazione Deterministica</h1>
      <p>Gestione regole e glossari AI su tabella <strong>UJET11.dbo.tabtipa</strong>.</p>
    </header>

    <main class="layout">
      <section class="panel list-wrap">
        <h2 class="panel-title">Elenco Tipologie</h2>
        <div class="search-box">
          <input id="searchInput" type="text" placeholder="Filtra per codice o descrizione...">
        </div>
        <div id="recordsList" class="records"></div>
      </section>

      <section class="panel">
        <h2 class="panel-title">Dettaglio e Modifica</h2>
        <div class="detail">
          <form id="detailForm">
            <div class="readonly-grid">
              <div class="field-group">
                <label for="tb_codtipa">Codice (Readonly)</label>
                <input id="tb_codtipa" name="tb_codtipa" type="text" readonly>
              </div>
              <div class="field-group">
                <label for="tb_destipa">Destinazione Tipo (Readonly)</label>
                <input id="tb_destipa" name="tb_destipa" type="text" readonly>
              </div>
              <div class="field-group">
                <label for="HH_tb_descr">Descrizione Base (Readonly)</label>
                <input id="HH_tb_descr" name="HH_tb_descr" type="text" readonly>
              </div>
            </div>

            <div class="field-group">
              <label for="HH_tb_AIdescr">HH_tb_AIdescr</label>
              <textarea
                id="HH_tb_AIdescr"
                name="HH_tb_AIdescr"
                rows="8"
                placeholder="Descrivi in modo deterministico come riconoscere caratteristiche fisiche principali (forma, struttura, finiture, dimensioni)."
              ></textarea>
            </div>

            <div class="field-group">
              <label for="HH_tb_AIcriter">HH_tb_AIcriter</label>
              <textarea
                id="HH_tb_AIcriter"
                name="HH_tb_AIcriter"
                rows="8"
                placeholder="Definisci criteri logici e regole if/then per classificazione certa di materiali, componenti e varianti."
              ></textarea>
            </div>

            <div class="field-group">
              <label for="HH_tb_AIgloss">HH_tb_AIgloss</label>
              <textarea
                id="HH_tb_AIgloss"
                name="HH_tb_AIgloss"
                rows="8"
                placeholder="Inserisci glossario tecnico con termini, sinonimi e accessori ammessi/esclusi per evitare ambiguita classificativa."
              ></textarea>
            </div>

            <div class="actions">
              <button id="saveBtn" class="btn btn-primary" type="submit" disabled>Salva</button>
            </div>
          </form>
          <div id="emptyState" class="empty-state">Seleziona un record dalla lista per visualizzare i dettagli.</div>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script>
    (function () {
      const state = {
        rows: [],
        filteredRows: [],
        selectedId: null,
        isSaving: false,
      };

      const elements = {
        loadingOverlay: document.getElementById('loadingOverlay'),
        recordsList: document.getElementById('recordsList'),
        searchInput: document.getElementById('searchInput'),
        detailForm: document.getElementById('detailForm'),
        emptyState: document.getElementById('emptyState'),
        saveBtn: document.getElementById('saveBtn'),
        toast: document.getElementById('toast'),
        tb_codtipa: document.getElementById('tb_codtipa'),
        tb_destipa: document.getElementById('tb_destipa'),
        HH_tb_descr: document.getElementById('HH_tb_descr'),
        HH_tb_AIdescr: document.getElementById('HH_tb_AIdescr'),
        HH_tb_AIcriter: document.getElementById('HH_tb_AIcriter'),
        HH_tb_AIgloss: document.getElementById('HH_tb_AIgloss'),
      };

      function setLoading(show) {
        elements.loadingOverlay.classList.toggle('show', show);
      }

      function showToast(message, type) {
        elements.toast.textContent = message;
        elements.toast.className = 'toast show ' + (type || '');

        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => {
          elements.toast.className = 'toast';
        }, 2800);
      }

      function resetForm() {
        elements.detailForm.reset();
        elements.saveBtn.disabled = true;
        elements.emptyState.style.display = 'block';
      }

      function fillForm(row) {
        elements.tb_codtipa.value = row.tb_codtipa || '';
        elements.tb_destipa.value = row.tb_destipa || '';
        elements.HH_tb_descr.value = row.HH_tb_descr || '';
        elements.HH_tb_AIdescr.value = row.HH_tb_AIdescr || '';
        elements.HH_tb_AIcriter.value = row.HH_tb_AIcriter || '';
        elements.HH_tb_AIgloss.value = row.HH_tb_AIgloss || '';
        elements.saveBtn.disabled = false;
        elements.emptyState.style.display = 'none';
      }

      function renderList() {
        if (!state.filteredRows.length) {
          elements.recordsList.innerHTML = '<div class="empty-state">Nessun record trovato.</div>';
          return;
        }

        const html = state.filteredRows
          .map((row) => {
            const isActive = String(row.tb_codtipa) === String(state.selectedId);
            return `
              <button type="button" class="record-item ${isActive ? 'active' : ''}" data-id="${row.tb_codtipa}">
                <span class="record-code">${row.tb_codtipa}</span>
                <span class="record-desc">${row.tb_destipa || '(senza descrizione)'}</span>
              </button>
            `;
          })
          .join('');

        elements.recordsList.innerHTML = html;
      }

      function selectRowById(id) {
        const selected = state.rows.find((row) => String(row.tb_codtipa) === String(id));
        if (!selected) {
          return;
        }
        state.selectedId = selected.tb_codtipa;
        fillForm(selected);
        renderList();
      }

      function applyFilter(query) {
        const normalized = query.trim().toLowerCase();
        if (!normalized) {
          state.filteredRows = [...state.rows];
          return;
        }

        state.filteredRows = state.rows.filter((row) => {
          const code = String(row.tb_codtipa || '').toLowerCase();
          const desc = String(row.tb_destipa || '').toLowerCase();
          return code.includes(normalized) || desc.includes(normalized);
        });
      }

      async function loadRows() {
        setLoading(true);
        try {
          const response = await fetch('/api/itt/tipa', {
            method: 'GET',
            credentials: 'include',
            headers: { 'Accept': 'application/json' },
          });

          if (!response.ok) {
            throw new Error('Caricamento fallito con stato ' + response.status);
          }

          const data = await response.json();
          state.rows = Array.isArray(data) ? data : [];
          applyFilter(elements.searchInput.value);
          renderList();

          if (state.rows.length > 0) {
            selectRowById(state.rows[0].tb_codtipa);
          } else {
            resetForm();
          }
        } catch (error) {
          console.error('Errore durante il caricamento:', error);
          showToast('Errore nel caricamento dei dati.', 'error');
          resetForm();
        } finally {
          setLoading(false);
        }
      }

      async function saveCurrentRow(event) {
        event.preventDefault();

        if (!state.selectedId || state.isSaving) {
          return;
        }

        state.isSaving = true;
        elements.saveBtn.disabled = true;
        elements.saveBtn.textContent = 'Salvataggio...';

        const payload = {
          HH_tb_AIdescr: elements.HH_tb_AIdescr.value,
          HH_tb_AIcriter: elements.HH_tb_AIcriter.value,
          HH_tb_AIgloss: elements.HH_tb_AIgloss.value,
        };

        try {
          const response = await fetch('/api/itt/tipa/' + encodeURIComponent(state.selectedId), {
            method: 'PUT',
            credentials: 'include',
            headers: {
              'Content-Type': 'application/json',
              'Accept': 'application/json',
            },
            body: JSON.stringify(payload),
          });

          if (!response.ok) {
            throw new Error('Salvataggio fallito con stato ' + response.status);
          }

          const idx = state.rows.findIndex((row) => String(row.tb_codtipa) === String(state.selectedId));
          if (idx >= 0) {
            state.rows[idx] = {
              ...state.rows[idx],
              ...payload,
            };
          }

          applyFilter(elements.searchInput.value);
          renderList();
          showToast('Salvataggio completato con successo.', 'success');
        } catch (error) {
          console.error('Errore durante il salvataggio:', error);
          showToast('Errore durante il salvataggio.', 'error');
        } finally {
          state.isSaving = false;
          elements.saveBtn.disabled = false;
          elements.saveBtn.textContent = 'Salva';
        }
      }

      function bindEvents() {
        elements.searchInput.addEventListener('input', (event) => {
          applyFilter(event.target.value);
          renderList();
        });

        elements.recordsList.addEventListener('click', (event) => {
          const btn = event.target.closest('button[data-id]');
          if (!btn) {
            return;
          }
          selectRowById(btn.getAttribute('data-id'));
        });

        elements.detailForm.addEventListener('submit', saveCurrentRow);
      }

      document.addEventListener('securityReady', async function () {
        bindEvents();
        await loadRows();
      });
    })();
  </script>
  <script src="/assets/js/portal-sidebar.js"></script>
</body>
</html>
