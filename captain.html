<!doctype html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Captain Console - UJet</title>
  <link rel="stylesheet" href="captain.css" />
</head>
<body class="captain-body">

  <aside class="sidebar">
    <div class="sidebar-header">UJet Captain</div>
    <nav class="sidebar-nav">
      <div class="nav-item active" data-target="utenti"><span style="font-size: 1.3rem; margin-bottom: 2px;">👥</span><span>Utenti</span></div>
      <div class="nav-item" data-target="moduli"><span style="font-size: 1.3rem; margin-bottom: 2px;">🧩</span><span>Accessi</span></div>
      <div class="nav-item" data-target="config"><span style="font-size: 1.3rem; margin-bottom: 2px;">⚙️</span><span>Config.</span></div>
      <div class="nav-item" data-target="audit"><span style="font-size: 1.3rem; margin-bottom: 2px;">🛡️</span><span>Audit</span></div>
    </nav>
    <div class="nav-item" style="border-top: 1px solid rgba(255,255,255,0.1); margin-top: auto;" id="backToAppBtn">
      <span style="font-size: 1.3rem; margin-bottom: 2px;">🔙</span><span>Esci</span>
    </div>
  </aside>

  <main class="main-content">
    <header class="topbar-console">
      <h2 style="margin: 0; color: var(--text);" id="consolePageTitle">Gestione Utenti</h2>
      <div style="font-weight: bold; color: var(--primary);">Admin: <span id="captainNameDisplay">Caricamento...</span></div>
    </header>
    
    <div class="content-area">
      <div class="data-card" id="view-utenti">
        <div class="data-card-header">
          <h3 style="margin: 0;">Anagrafica Globale (Passaporti)</h3>
          <button class="action-btn" style="background: var(--primary); color: white; padding: 8px 16px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer;">+ Nuovo Utente</button>
        </div>
        <p style="color: var(--text-muted);">L'interfaccia di gestione verrà caricata qui.</p>
      </div>
    </div>
  </main>

  <div class="scanner-modal" id="adminUserModal" aria-hidden="true">
    <div class="scanner-modal-inner" style="width: 400px; max-width: 90%;">
      <p class="scanner-title">Nuovo Utente (Passaporto & Visti)</p>

      <div class="login-field">
        <label>Nome Completo</label>
        <input type="text" id="adminNewName" class="control" style="width:100%" autocomplete="off" />
      </div>
      <div class="login-field">
        <label>Barcode Login</label>
        <input type="text" id="adminNewBarcode" class="control" style="width:100%" autocomplete="off" />
      </div>
      <div class="login-field">
        <label>Password (Opzionale)</label>
        <input type="password" id="adminNewPassword" class="control" style="width:100%" autocomplete="new-password" placeholder="Default: 123456" />
      </div>

      <div style="margin-top: 20px; border-top: 1px solid var(--border); padding-top: 10px;">
        <p style="font-weight: 600; margin-bottom: 10px;">Assegna Accessi (Visti):</p>
        <div id="dynamicRolesContainer" style="display: flex; flex-direction: column; gap: 8px;"></div>
      </div>

      <div class="login-actions" style="margin-top: 24px; gap: 12px; display: flex;">
        <button type="button" class="scanner-cancel" id="adminUserCancelBtn" style="flex:1;">Annulla</button>
        <button type="button" class="scanner-cancel" id="adminUserSaveBtn" style="flex:1; background: var(--success); color: white; border: none;">Salva</button>
      </div>
    </div>
  </div>

  <script>
    const API_URL = '/api';
    let globalUsers = [];
    let globalModules = [];

    // Utility per chiamate API protette
    async function apiFetch(endpoint, options = {}) {
      options.credentials = 'include';
      const res = await fetch(`${API_URL}${endpoint}`, options);
      if (res.status === 401 || res.status === 403) {
        alert('Sessione scaduta o privilegi insufficienti. Ritorno al login.');
        window.location.href = 'index.html';
        throw new Error('Non autorizzato');
      }
      if (!res.ok) throw new Error(await res.text());
      return res.json();
    }

    // Inizializzazione della Console
    async function initCaptainConsole() {
      try {
        // 1. Verifica chi è loggato
        const me = await apiFetch('/me');
        if (!me.isSuperuser) {
          alert('Accesso negato. Solo i Captain possono accedere a questa area.');
          window.location.href = 'index.html';
          return;
        }
        document.getElementById('captainNameDisplay').textContent = me.name;

        // 2. Carica i dati base
        await loadData();
      } catch (err) {
        console.error('Errore inizializzazione:', err);
      }
    }

    async function loadData() {
      try {
        const [users, modules] = await Promise.all([
          apiFetch('/admin/users'),
          apiFetch('/admin/modules')
        ]);
        globalUsers = users;
        globalModules = modules;
        
        renderUsersTable();
      } catch (err) {
        console.error('Errore nel caricamento dei dati Admin:', err);
      }
    }

    // Renderizza la griglia degli utenti
    function renderUsersTable() {
      const container = document.getElementById('view-utenti');
      let html = `
        <div class="data-card-header">
          <h3 style="margin: 0;">Anagrafica Globale (Passaporti)</h3>
          <button class="action-btn" style="background: var(--primary); color: white; padding: 8px 16px; border-radius: 4px; border: none; font-weight: bold; cursor: pointer;">+ Nuovo Utente</button>
        </div>
        <div style="overflow-x: auto;">
          <table style="width: 100%; border-collapse: collapse; text-align: left; font-size: 0.95rem;">
            <thead>
              <tr style="border-bottom: 2px solid var(--border);">
                <th style="padding: 12px; color: var(--text-muted);">ID</th>
                <th style="padding: 12px; color: var(--text-muted);">Nome</th>
                <th style="padding: 12px; color: var(--text-muted);">Barcode</th>
                <th style="padding: 12px; color: var(--text-muted);">Stato</th>
                <th style="padding: 12px; color: var(--text-muted); text-align: right;">Azioni</th>
              </tr>
            </thead>
            <tbody>
      `;
      
      if (globalUsers.length === 0) {
        html += `<tr><td colspan="5" style="padding: 16px; text-align: center; color: var(--text-muted);">Nessun utente trovato.</td></tr>`;
      } else {
        globalUsers.forEach(u => {
          const statusBadge = u.isActive 
            ? `<span style="padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; background: var(--success); color: white;">Attivo</span>`
            : `<span style="padding: 4px 10px; border-radius: 12px; font-size: 0.8rem; font-weight: bold; background: var(--danger); color: white;">Disattivo</span>`;
            
          html += `
            <tr style="border-bottom: 1px solid var(--border); transition: background 0.2s;" onmouseover="this.style.background='var(--bg)'" onmouseout="this.style.background='transparent'">
              <td style="padding: 12px; color: var(--text-muted);">#${u.id}</td>
              <td style="padding: 12px; font-weight: bold;">${u.name}</td>
              <td style="padding: 12px; font-family: monospace; font-size: 1rem;">${u.barcode}</td>
              <td style="padding: 12px;">${statusBadge}</td>
              <td style="padding: 12px; text-align: right;">
                <button style="background: var(--bg); border: 1px solid var(--border); padding: 6px 16px; border-radius: 4px; cursor: pointer; font-weight: 600; color: var(--primary-dark);">Gestisci Accessi</button>
              </td>
            </tr>
          `;
        });
      }

      html += `</tbody></table></div>`;
      container.innerHTML = html;
    }

    // Navigazione Sidebar
    document.getElementById('backToAppBtn').addEventListener('click', () => {
      window.location.href = 'index.html';
    });

    document.querySelectorAll('.nav-item[data-target]').forEach(item => {
      item.addEventListener('click', (e) => {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        e.currentTarget.classList.add('active');
        
        // Estrai solo il testo pulito (rimuove l'emoji) per il titolo
        const spans = e.currentTarget.querySelectorAll('span');
        const titleText = spans.length > 1 ? spans[1].innerText : e.currentTarget.innerText;
        document.getElementById('consolePageTitle').innerText = titleText.replace(/[^\w\s]/gi, '').trim();
      });
    });

    // Modal Nuovo Utente (Passaporto & Visti)
    function openNewUserModal() {
      document.getElementById('adminNewName').value = '';
      document.getElementById('adminNewBarcode').value = '';
      document.getElementById('adminNewPassword').value = '';

      const container = document.getElementById('dynamicRolesContainer');
      container.innerHTML = '';

      globalModules.forEach(mod => {
        const roles = mod.roleDefinition;
        if (!roles) return;

        const modGroup = document.createElement('div');
        modGroup.style.marginBottom = '8px';
        modGroup.innerHTML = `<strong style="font-size:0.9rem; color: var(--primary);">${mod.name}</strong>`;

        for (const [roleKey, roleInfo] of Object.entries(roles)) {
          const lbl = document.createElement('label');
          lbl.style.display = 'flex';
          lbl.style.alignItems = 'center';
          lbl.style.gap = '8px';
          lbl.style.fontSize = '0.9rem';
          lbl.style.marginTop = '4px';
          lbl.style.cursor = 'pointer';

          lbl.innerHTML = `
                <input type="checkbox" class="role-checkbox" data-target-table="${mod.targetTable}" data-role-key="${roleKey}">
                ${roleInfo.label}
            `;
          modGroup.appendChild(lbl);
        }
        container.appendChild(modGroup);
      });

      const modal = document.getElementById('adminUserModal');
      modal.classList.add('is-open');
      modal.setAttribute('aria-hidden', 'false');
    }

    // Delegazione: + Nuovo Utente (il bottone viene re-renderizzato in renderUsersTable)
    document.getElementById('view-utenti').addEventListener('click', (e) => {
      if (e.target.closest('.action-btn')) openNewUserModal();
    });

    document.getElementById('adminUserCancelBtn').addEventListener('click', () => {
      document.getElementById('adminUserModal').classList.remove('is-open');
      document.getElementById('adminUserModal').setAttribute('aria-hidden', 'true');
    });

    document.getElementById('adminUserSaveBtn').addEventListener('click', async () => {
      const name = document.getElementById('adminNewName').value.trim();
      const barcode = document.getElementById('adminNewBarcode').value.trim();
      const password = document.getElementById('adminNewPassword').value;

      if (!name || !barcode) {
        alert('Nome e Barcode sono obbligatori');
        return;
      }

      const selectedRoles = Array.from(document.querySelectorAll('.role-checkbox:checked')).map(cb => ({
        targetTable: cb.dataset.targetTable,
        roleKey: cb.dataset.roleKey
      }));

      try {
        await apiFetch('/admin/users', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, barcode, password, roles: selectedRoles })
        });
        document.getElementById('adminUserModal').classList.remove('is-open');
        document.getElementById('adminUserModal').setAttribute('aria-hidden', 'true');
        loadData();
      } catch (err) {
        alert('Errore salvataggio: ' + err.message);
      }
    });

    // Avvia l'app
    initCaptainConsole();
  </script>
</body>
</html>
